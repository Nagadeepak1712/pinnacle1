<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Pinnacle Builders & Promoters | Premium Construction & Development</title>
    <meta name="description" content="Pinnacle Builders & Promoters specializes in premium residential and commercial construction, delivering high-quality, luxury developments." />
    <meta name="keywords" content="Pinnacle Builders, Construction, Real Estate, Promoters, Developers, Residential, Commercial, Luxury Homes" />
    <meta name="author" content="Pinnacle Builders & Promoters" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pinnacle Builders & Promoters" />
    <meta property="og:description" content="Premium residential and commercial construction and development." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:url" content="https://pinnaclebuilders.co" />
    <meta property="og:site_name" content="Pinnacle Builders & Promoters" />

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Pinnacle Builders & Promoters">
    <meta name="twitter:description" content="Premium residential and commercial construction and development.">
    <meta name="twitter:image" content="/logo.png">
    
    <style>
      /* Initial Page Loading Animation */
      #initial-loader {
        position: fixed;
        inset: 0;
        background-color: #0b1d35; /* Navy brand color */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top-color: #b88d44; /* Gold brand color */
        animation: spin 1s ease-in-out infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(0.95); }
      }
      .loader-logo {
        height: 100px;
        width: auto;
        margin-bottom: 24px;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <img src="/logo.png" alt="Pinnacle Logo" class="loader-logo" />
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
